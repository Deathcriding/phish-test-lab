worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server {
        listen 80;
        server_name _;

        auth_basic "Restricted Access";
        auth_basic_user_file /home/user/phish-test-lab/valid-site/.htpasswd;

        location / {
            root /home/user/phish-test-lab/valid-site/;
            index index.html;
            
            add_header X-Client-IP $remote_addr always;
        }

        access_log /home/user/phish-test-lab/valid-site/access.log;
        error_log /home/user/phish-test-lab/valid-site/error.log;
    }
}
