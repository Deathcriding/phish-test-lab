# Минимальная рабочая конфигурация
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server {
        listen 80;
        server_name _;

        # Basic Authentication
        auth_basic "Restricted Access";
        auth_basic_user_file /opt/phish-lab/legit-portal/.htpasswd;

        location / {
            root /opt/phish-lab/legit-portal/html;
            index index.html;
        }

        # Логи для отладки
        access_log /opt/phish-lab/legit-portal/access.log;
        error_log /opt/phish-lab/legit-portal/error.log;
    }
}