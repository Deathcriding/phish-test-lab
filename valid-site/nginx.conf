server {
    listen 80;
    server_name portal.corp.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name portal.corp.local;

    ssl_certificate /etc/nginx/ssl/legit.crt;
    ssl_certificate_key /etc/nginx/ssl/legit.key;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    root /var/www/site;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}